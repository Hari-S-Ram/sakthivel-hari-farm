<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coconut Seedlings | Sakthivel Hari Farm</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="nav">Sakthivel Hari Farm</div>

<!-- HERO -->
<div class="hero">
    <h1>High Yield Coconut Seedlings</h1>
    <p>Direct Farm Sale | High Yield | Bulk Orders Available</p>

    <a href="tel:9360421569">
        <button class="btn btn-blue">📞 Call Now</button>
    </a>

    <a href="https://wa.me/919360421569">
        <button class="btn btn-green">💬 WhatsApp</button>
    </a>
</div>

<!-- ORDER -->
<div class="section" id="order">
    <h2>Place Your Order</h2>

    <form onsubmit="sendToWhatsApp(event)">

        <select id="variety" required onchange="calculatePrice()">
            <option value="" disabled selected>Select Variety</option>
            <option value="Dwarf">Dwarf</option>
            <option value="Tall">Tall</option>
            <option value="Hybrid">Hybrid</option>
        </select>

        <input type="text" id="name" placeholder="Name" required>

        <!-- PHONE + OTP -->
        <input type="tel" id="phone" placeholder="Phone" required>

        <button type="button" id="sendOtpBtn" onclick="sendOTP()">Send OTP</button>

        <div id="otpSection" style="display:none;">
            <input type="text" id="otp" placeholder="Enter OTP"><br>
            <p id="timer">05:00</p>
            <button type="button" onclick="verifyOTP()">Verify OTP</button>
        </div>

        <div id="recaptcha-container"></div>

        <input type="number" id="qty" placeholder="Quantity"
        required oninput="calculatePrice()" min="5" max="500">

        <input type="text" id="price" placeholder="Total Price" readonly>

        <textarea id="location" placeholder="Enter your delivery location" required></textarea>

        <button id="placeOrderBtn" class="btn btn-green" type="submit" disabled>
            Place Order
        </button>

    </form>
</div>

<script src="script.js"></script>

<!-- FIREBASE OTP -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0rUbqm6Xe88d_YfYfskAYrjw4MlMYfH8",
  authDomain: "sakthivel-hari-farm-direct.firebaseapp.com",
  projectId: "sakthivel-hari-farm-direct",
  appId: "1:939736601900:web:ba48af347a4c4e0b40c889"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let confirmationResult;
let timerInterval;
window.otpVerified = false;

// Recaptcha
window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
    size: 'normal'
});

// SEND OTP
window.sendOTP = function () {

    let phone = document.getElementById("phone").value.trim();

    if (phone.length !== 10) {
        alert("Enter valid phone number");
        return;
    }

    phone = "+91" + phone;

    document.getElementById("sendOtpBtn").disabled = true;

    signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
        .then((result) => {

            confirmationResult = result;

            alert("OTP Sent (use 123456)");

            document.getElementById("otpSection").style.display = "block";

            startTimer(300);

        })
        .catch((error) => {
            alert(error.message);
            document.getElementById("sendOtpBtn").disabled = false;
        });
};

// VERIFY OTP
window.verifyOTP = function () {

    let code = document.getElementById("otp").value;

    confirmationResult.confirm(code)
        .then(() => {

            window.otpVerified = true;

            clearInterval(timerInterval);

            alert("OTP Verified ✅");

            document.getElementById("placeOrderBtn").disabled = false;

            // 🔒 Lock phone after verification
            document.getElementById("phone").readOnly = true;

        })
        .catch(() => {
            alert("Wrong OTP");
        });
};

// TIMER
function startTimer(seconds) {

    let time = seconds;

    timerInterval = setInterval(() => {

        let min = Math.floor(time / 60);
        let sec = time % 60;

        document.getElementById("timer").innerText =
            `${min}:${sec < 10 ? "0" + sec : sec}`;

        time--;

        if (time < 0) {
            clearInterval(timerInterval);
            alert("OTP expired");
            document.getElementById("sendOtpBtn").disabled = false;
        }

    }, 1000);
}

</script>

</body>
</html>
